# bootstrap.khandaq.org — public Tox bootstrap registry (static JSON)
map $http_x_forwarded_proto $bootstrap_forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bootstrap.khandaq.org;

    ssl_certificate /etc/letsencrypt/live/bootstrap.khandaq.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bootstrap.khandaq.org/privkey.pem;

    access_log /var/log/nginx/bootstrap_khandaq_access.log combined;
    error_log /var/log/nginx/bootstrap_khandaq_error.log warn;

    root /var/www/bootstrap.khandaq.org;
    index nodes.json;

    add_header Access-Control-Allow-Origin * always;
    add_header Cache-Control "public, max-age=300" always;

    location = /nodes.json {
        default_type application/json;
        add_header Content-Type application/json always;
        add_header Access-Control-Allow-Origin * always;
        try_files /nodes.json =404;
    }

    location = / {
        return 302 /nodes.json;
    }
}
