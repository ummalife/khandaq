services:
  khandaq-bootstrap:
    build: .
    image: khandaq-bootstrap:latest
    container_name: khandaq-bootstrap
    restart: unless-stopped
    network_mode: host
    volumes:
      - khandaq-bootstrap-keys:/var/lib/tox-bootstrapd
    environment:
      - TZ=UTC
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  khandaq-bootstrap-keys:
