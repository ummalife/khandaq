limit_req_zone $binary_remote_addr zone=khandaq_push:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=khandaq_push_conn:10m;

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name push.khandaq.org;

    ssl_certificate /etc/letsencrypt/live/push.khandaq.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/push.khandaq.org/privkey.pem;

    access_log /var/log/nginx/push_khandaq_access.log combined;
    error_log /var/log/nginx/push_khandaq_error.log warn;

    client_max_body_size 64k;

    location / {
        limit_req zone=khandaq_push burst=10 nodelay;
        limit_conn khandaq_push_conn 20;

        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }
}
