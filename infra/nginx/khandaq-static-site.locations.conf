    # Legacy Element Web UI backed up under /var/www/backups/ (see deploy-site.sh)
    location = /messenger {
        return 301 https://$host/;
    }
    location ^~ /messenger/ {
        return 301 https://$host/;
    }

    location ^~ /downloads/ {
        alias /var/www/khandaq-site/downloads/;
        index index.html;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options nosniff always;
        autoindex off;
    }

    location = /robots.txt {
        root /var/www/khandaq-site;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /sitemap.xml {
        root /var/www/khandaq-site;
        add_header Content-Type application/xml always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location /assets/ {
        root /var/www/khandaq-site;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /style.css {
        root /var/www/khandaq-site;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /changelog.json {
        root /var/www/khandaq-site;
        default_type application/json;
        add_header Cache-Control "public, max-age=600" always;
    }

    location / {
        root /var/www/khandaq-site;
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
